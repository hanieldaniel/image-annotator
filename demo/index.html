<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>img-marker demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      background: #f4f4f5;
      color: #111;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .sections {
      display: grid;
      gap: 1.5rem;
      max-width: 720px;
    }

    .section {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 1.5rem;
    }

    .section h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.45rem 0.9rem;
      background: #18181b;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.875rem;
    }

    button:hover { background: #3f3f46; }

    .preview {
      margin-top: 1rem;
      min-height: 72px;
      border: 1px dashed #d4d4d8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.8125rem;
      overflow: hidden;
    }

    .preview img {
      width: 100%;
      display: block;
      border-radius: 5px;
    }

    /* Fake dashboard widget used as the DOM screenshot target */
    .widget {
      padding: 1rem;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .widget h3 {
      font-size: 0.9375rem;
      margin-bottom: 0.375rem;
      color: #1e3a5f;
    }

    .widget p {
      font-size: 0.8125rem;
      color: #4b6a8a;
      margin-bottom: 0.75rem;
    }

    .stats {
      display: flex;
      gap: 0.75rem;
    }

    .stat {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 4px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8125rem;
      color: #374151;
    }

    .stat strong {
      display: block;
      font-size: 1.1rem;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <h1>@hanieldaniel/img-marker</h1>
  <p class="subtitle">Demo — annotated result appears below each section after saving.</p>

  <div class="sections">

    <div class="section">
      <h2>1 — File upload</h2>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <button id="file-btn">Choose image…</button>
      <div class="preview" id="file-preview">No result yet</div>
    </div>

    <div class="section">
      <h2>2 — Screenshot (drag to select)</h2>
      <p style="font-size:0.8125rem;color:#666;margin-bottom:0.75rem;">Click the button, then drag to select any area of the page.</p>
      <button id="dom-btn">Select area &amp; annotate</button>
      <div class="preview" id="dom-preview">No result yet</div>
    </div>

    <div class="section">
      <h2>3 — Camera</h2>
      <button id="camera-btn">Open camera</button>
      <div class="preview" id="camera-preview">No result yet</div>
    </div>

  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
